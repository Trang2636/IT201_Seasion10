<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh mục thiết bị / phòng Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
<h2>Danh mục thiết bị / phòng Lab</h2>

<!--<div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>-->

<div class="row g-3">
    <div class="col-md-4" th:each="it : ${items}">
        <div class="card h-100">
            <img th:src="@{/images/{file}(file=${it.imageUrl})}" class="card-img-top" alt="image">

            <div class="card-body">
                <h5 class="card-title" th:text="${it.name}"></h5>
                <p class="card-text">Tồn kho: <b th:text="${it.availableQuantity}"></b></p>
                <p class="card-text">Loại: <span th:text="${it.type}"></span></p>
                <a class="btn btn-primary" th:href="@{/student/borrow/{id}(id=${it.id})}">Đăng ký mượn</a>
            </div>
        </div>
    </div>
</div>

<hr/>
<a class="btn btn-outline-dark" th:href="@{/admin/requests}">Trang quản lý yêu cầu (Admin)</a>
</body>
</html>
