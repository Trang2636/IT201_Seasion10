<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form đăng ký mượn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
<h2>Form đăng ký mượn</h2>

<div class="card mb-3">
    <div class="card-body">
        <h5 th:text="${item.name}"></h5>
        <p>Tồn kho hiện tại: <b th:text="${item.availableQuantity}"></b></p>
    </div>
</div>

<form th:action="@{/student/borrow}" th:object="${borrowRequest}" method="post" class="row g-3">
    <input type="hidden" th:field="*{resourceId}"/>

    <div class="col-md-6">
        <label class="form-label">Họ và tên</label>
        <input class="form-control" th:field="*{fullName}">
        <small class="text-danger" th:errors="*{fullName}"></small>
    </div>

    <div class="col-md-6">
        <label class="form-label">Mã sinh viên</label>
        <input class="form-control" th:field="*{studentCode}">
        <small class="text-danger" th:errors="*{studentCode}"></small>
    </div>

    <div class="col-md-6">
        <label class="form-label">Email</label>
        <input class="form-control" th:field="*{email}">
        <small class="text-danger" th:errors="*{email}"></small>
    </div>

    <div class="col-md-6">
        <label class="form-label">Số lượng</label>
        <input type="number" class="form-control" th:field="*{quantity}">
        <small class="text-danger" th:errors="*{quantity}"></small>
    </div>

    <div class="col-md-6">
        <label class="form-label">Ngày dự kiến nhận</label>
        <input type="date" class="form-control" th:field="*{borrowDate}">
        <small class="text-danger" th:errors="*{borrowDate}"></small>
    </div>

    <div class="col-md-6">
        <label class="form-label">Ngày dự kiến trả</label>
        <input type="date" class="form-control" th:field="*{returnDate}">
        <small class="text-danger" th:errors="*{returnDate}"></small>
    </div>

    <div class="col-12">
        <label class="form-label">Lý do mượn</label>
        <textarea class="form-control" rows="3" th:field="*{reason}"></textarea>
        <small class="text-danger" th:errors="*{reason}"></small>
    </div>

    <div class="col-12">
        <button class="btn btn-success">Gửi đăng ký</button>
        <a class="btn btn-secondary" th:href="@{/student/resources}">Quay lại</a>
    </div>
</form>
</body>
</html>
