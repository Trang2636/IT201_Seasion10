<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Form thiết bị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
<h2 th:text="${id == null} ? 'Thêm thiết bị/phòng' : 'Sửa thiết bị/phòng'"></h2>

<form th:action="${id == null} ? @{/admin/resources/new} : @{/admin/resources/edit/{id}(id=${id})}"
      th:object="${resourceForm}" method="post" class="row g-3">

    <div class="col-md-6">
        <label class="form-label">Tên</label>
        <input class="form-control" th:field="*{name}">
        <small class="text-danger" th:errors="*{name}"></small>
    </div>

    <div class="col-md-6">
        <label class="form-label">URL ảnh</label>
        <input class="form-control" th:field="*{imageUrl}">
        <small class="text-danger" th:errors="*{imageUrl}"></small>
    </div>

    <div class="col-md-6">
        <label class="form-label">Tồn kho</label>
        <input type="number" class="form-control" th:field="*{availableQuantity}">
        <small class="text-danger" th:errors="*{availableQuantity}"></small>
    </div>

    <div class="col-md-6">
        <label class="form-label">Loại</label>
        <select class="form-select" th:field="*{type}">
            <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
        </select>
    </div>

    <div class="col-12">
        <button class="btn btn-success">Lưu</button>
        <a class="btn btn-secondary" th:href="@{/admin/resources}">Quay lại</a>
    </div>
</form>
</body>
</html>
